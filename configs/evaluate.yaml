evaluation:
  # CSV containing the observed follow-up time and event indicator.
  truth_path: data/cvd_transformer_survival_formatted_valid.csv

  # CSV generated by `python -m cvd_transformer_survival.predict`.
  prediction_path: results/uploaded_training/valid_predictions.csv

  # Output metrics table.
  output_path: results/uploaded_training/evaluation_metrics.csv

  time_column: time
  event_column: f

  # For 10-year CVD risk evaluation, events after 10 years are treated as censored at 10 years.
  horizon: 10

  # The prediction CSV contains cumulative_survival_interval_10, so risk is computed as 1 - survival.
  horizon_interval: 10

  # Optional. Use this when truth/prediction rows are not in the same order.
  # id_column: participant_id
